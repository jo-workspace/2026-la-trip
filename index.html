<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>202608 LA 旅遊助手</title>
  
  <!-- 引入優質字型 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <script>
    // 🎨 0. 動態載入樣式
    fetch('styles.html?v=2.0')
      .then(r => r.text())
      .then(data => {
        const styleDiv = document.createElement('div');
        styleDiv.innerHTML = data;
        document.head.appendChild(styleDiv);
      })
      .catch(err => console.error("載入樣式失敗:", err));

    // 🧙‍♂️ 1. 建立萬能全局攔截器，模擬 Google Apps Script 執行環境
    window.google = {
      script: {
        run: (function() {
          function createRunner(successCb, failureCb) {
            return new Proxy({}, {
              get(target, propKey) {
                // 如果是設定回調函數
                if (propKey === 'withSuccessHandler') {
                  return function(cb) {
                    return createRunner(cb, failureCb);
                  };
                }
                if (propKey === 'withFailureHandler') {
                  return function(cb) {
                    return createRunner(successCb, cb);
                  };
                }
                
                // 否則，即為執行後端 Apps Script 的函數
                return function(...args) {
                  const token = localStorage.getItem('la_trip_api_token') || '';
                  const defaultUrl = "https://script.google.com/macros/s/AKfycbwuT0HjqVqIpY9fO-zHC9xuG_U6et5AsYE9qkhR8_PqvLG3vTWdxRGERLbeEXzo4iUQ/exec";
                  let scriptUrl = localStorage.getItem('la_trip_api_url') || '';
                  
                  // 自動驗證與修正：若發現快取中為不正確/過期的 Apps Script 網址，自動清除並套用預設網址
                  if (scriptUrl && (!scriptUrl.includes('/macros/s/') || !scriptUrl.includes('/exec'))) {
                    localStorage.removeItem('la_trip_api_url');
                    scriptUrl = defaultUrl;
                  } else if (!scriptUrl) {
                    scriptUrl = defaultUrl;
                  }

                  const requestBody = {
                    action: propKey,
                    token: token,
                    args: args
                  };

                  fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(requestBody)
                  })
                  .then(res => {
                    if (!res.ok) {
                      throw new Error(`HTTP 錯誤狀態: ${res.status}`);
                    }
                    return res.text();
                  })
                  .then(text => {
                    let res;
                    try {
                      res = JSON.parse(text);
                    } catch (e) {
                      console.error("解析 API 回傳失敗。原始內容:", text);
                      if (text.includes("<!DOCTYPE html>") || text.includes("<html") || text.startsWith("The page") || text.includes("google.com")) {
                        throw new Error("API 網址回傳了 HTML 網頁而非 JSON。這代表您可能輸入了錯誤的網址（例如試算表網址、或是 /dev 開發網址），或者您尚未發佈此 Web App 並授權給「任何人(Anyone)」存取。");
                      }
                      throw new Error(`回傳格式非 JSON: ${text.substring(0, 100)}...`);
                    }
                    
                    if (res && (res.error || res.status === 'error')) {
                      if (failureCb) {
                        failureCb(new Error(res.error || "API 執行失敗"));
                      }
                    } else {
                      if (successCb) {
                        // 支援有包裝 `{ success: true, result: ... }` 或無包裝的 JSON 物件
                        const output = (res && res.result !== undefined) ? res.result : res;
                        successCb(output);
                      }
                    }
                  })
                  .catch(err => {
                    if (failureCb) {
                      failureCb(err);
                    } else {
                      console.error("Network error:", err);
                    }
                  });
                };
              }
            });
          }
          return createRunner(null, null);
        })()
      }
    };

    // ⚙️ API 設定 Prompt (簡化為僅詢問認證金鑰)
    function openSettingsPrompt() {
      const currentToken = localStorage.getItem('la_trip_api_token') || '';
      
      const newToken = prompt("請輸入認證金鑰 (API Token / 暗號)：\n(若無設定請直接留空按確定)", currentToken);
      if (newToken !== null) {
        const trimmedToken = newToken.trim();
        
        // 隱藏進階功能：如果輸入 RESET_URL 可以手動更改/覆蓋 API 網址
        if (trimmedToken === 'RESET_URL') {
          const currentUrl = localStorage.getItem('la_trip_api_url') || '';
          const newUrl = prompt("【進階】請輸入新的 Google Apps Script Web App 網址：", currentUrl);
          if (newUrl !== null) {
            localStorage.setItem('la_trip_api_url', newUrl.trim());
          }
        } else {
          localStorage.setItem('la_trip_api_token', trimmedToken);
        }
        
        if (typeof showToast === 'function') {
          showToast("API 設定已儲存，正在重新載入資料...");
        } else {
          alert("API 設定已儲存，正在重新載入資料...");
        }
        
        if (typeof handleRefresh === 'function') {
          handleRefresh();
        } else {
          location.reload();
        }
      }
    }

    // 初次載入無須彈出引導，直接使用預設連結載入資料

    // 隱藏/顯示已完成項目切換
    function toggleHideVisited() {
      const cb = document.getElementById('hideVisitedToggle');
      if (!cb) return;
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event('change'));
      updateToggleBtnStyle();
    }

    function updateToggleBtnStyle() {
      const cb = document.getElementById('hideVisitedToggle');
      const icon = document.getElementById('toggleVisitedIcon');
      const btn = document.getElementById('toggleVisitedBtn');
      if (!cb || !icon || !btn) return;
      
      if (cb.checked) {
        icon.innerText = "🙈";
        btn.title = "已隱藏完成項目（點擊顯示全部）";
        btn.className = "p-1.5 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-all duration-200 focus:outline-none active:scale-90 flex items-center justify-center cursor-pointer";
      } else {
        icon.innerText = "👁️";
        btn.title = "已顯示全部項目（點擊隱藏完成）";
        btn.className = "p-1.5 text-emerald-600 bg-emerald-50/70 hover:bg-emerald-100/70 rounded-full transition-all duration-200 focus:outline-none active:scale-90 flex items-center justify-center cursor-pointer";
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(updateToggleBtnStyle, 100);
    });
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased pb-24">

  <!-- 頂部導覽列 (單排超精簡控制區) -->
  <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 px-4 py-2.5 shadow-xs flex justify-between items-center transition-all duration-200">
    <div class="text-base font-black tracking-tight text-slate-900 font-outfit bg-gradient-to-r from-slate-950 to-slate-700 bg-clip-text text-transparent select-none flex items-center space-x-1.5">
      <span>🇺🇸</span><span class="tracking-wide">LA TRIP</span>
    </div>
    <div class="flex items-center space-x-1.5 flex-shrink-0">
      <!-- 隱藏開關 (隱藏的 checkbox + 點選按鈕) -->
      <input type="checkbox" id="hideVisitedToggle" checked class="hidden">
      <button id="toggleVisitedBtn" onclick="toggleHideVisited()" class="p-1.5 text-slate-400 hover:text-slate-800 hover:bg-slate-100 rounded-full transition-all duration-200 focus:outline-none active:scale-90 flex items-center justify-center cursor-pointer" title="切換隱藏完成項目">
        <span id="toggleVisitedIcon" class="block text-base leading-none select-none">🙈</span>
      </button>
      
      <!-- 重新整理按鈕 -->
      <button id="refreshBtn" onclick="handleRefresh()" class="p-1.5 text-slate-400 hover:text-slate-800 hover:bg-slate-100 rounded-full transition-all duration-200 focus:outline-none active:scale-90 flex items-center justify-center cursor-pointer" title="強製重新讀取資料">
        <span id="refreshIcon" class="block text-base leading-none select-none">🔄</span>
      </button>

      <!-- API 設定按鈕 -->
      <button id="settingsBtn" onclick="openSettingsPrompt()" class="p-1.5 text-slate-400 hover:text-slate-800 hover:bg-slate-100 rounded-full transition-all duration-200 focus:outline-none active:scale-90" title="API 設定">
        <span class="block text-base leading-none select-none">⚙️</span>
      </button>
    </div>
  </header>

  <!-- 二級控制列 (分類與商店篩選) -->
  <div id="subSubControl" class="bg-slate-100/50 backdrop-blur-xs px-4 py-2 border-b border-slate-200/60 hidden flex space-x-1.5 overflow-x-auto no-scrollbar flex-shrink-0"></div>

  <!-- 主容器 -->
  <main class="max-w-md mx-auto px-4 mt-4" id="mainContainer">
    <!-- 預設顯示骨架屏 -->
    <div id="skeletonContainer"></div>
  </main>

  <!-- Lightbox 燈箱 (優化縮放效果) -->
  <div id="lightbox" onclick="closeLightbox()" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 cursor-zoom-out transition-all duration-300">
    <div class="relative max-w-full max-h-full flex items-center justify-center">
      <img id="lightbox-img" src="" class="max-w-full max-h-[85vh] object-contain shadow-2xl rounded-lg" alt="Enlarged view">
      <button onclick="event.stopPropagation(); closeLightbox();" class="absolute -top-12 right-0 text-white text-3xl font-light p-2 hover:opacity-80 active:scale-90 transition-transform">✕</button>
    </div>
  </div>

  <!-- 1. 行程 Modal -->
  <div id="modal-itinerary" class="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 hidden opacity-0 transition-opacity duration-200">
    <div class="bg-white rounded-t-3xl sm:rounded-2xl w-full sm:max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto transform translate-y-10 transition-transform duration-200">
      <div class="flex justify-between items-center pb-4 border-b border-slate-100 mb-4">
        <h2 id="itinerary-modal-title" class="text-lg font-bold text-slate-900">新增行程項目</h2>
        <button onclick="closeItineraryModal()" class="text-slate-400 hover:text-slate-700 text-xl font-bold cursor-pointer p-1">✕</button>
      </div>
      <form id="itinerary-form" onsubmit="event.preventDefault(); submitItineraryForm();">
        <input type="hidden" id="iti-rowIndex">
        <input type="hidden" id="iti-isVisited" value="false">
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">日期天數 *</label>
            <input type="text" id="iti-day" placeholder="如 Day 1" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
          </div>
          <div>
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">時間 (選填)</label>
            <input type="text" id="iti-time" placeholder="如 09:00" class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">分類 *</label>
          <select id="iti-type" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
            <option value="景點">📍 景點</option>
            <option value="美食">🍔 美食</option>
            <option value="交通">🚗 交通</option>
            <option value="住宿">🏨 住宿</option>
            <option value="航班">✈️ 航班</option>
            <option value="球場">⚾ 球場</option>
            <option value="購物">🛒 購物</option>
            <option value="行程">🗓️ 行程</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">名稱/標題 *</label>
          <input type="text" id="iti-title" placeholder="景點或餐廳名稱" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">說明/備註</label>
          <textarea id="iti-content" rows="3" placeholder="輸入相關備註事項..." class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold"></textarea>
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">導航連結 (選填)</label>
          <input type="url" id="iti-links" placeholder="Google 地圖連結" class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
        </div>
        <div class="flex space-x-3 mt-6">
          <button type="button" id="iti-delete-btn" onclick="deleteItinerary()" class="btn-delete bg-rose-50 hover:bg-rose-100 active:scale-95 text-rose-600 font-bold text-sm px-4.5 py-2.5 rounded-xl transition-all hidden">🗑️ 刪除</button>
          <button type="button" onclick="closeItineraryModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-700 font-bold text-sm py-2.5 rounded-xl transition-all">取消</button>
          <button type="submit" id="iti-save-btn" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-95 text-white font-bold text-sm py-2.5 rounded-xl transition-all">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 2. 待辦 Modal -->
  <div id="modal-todo" class="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 hidden opacity-0 transition-opacity duration-200">
    <div class="bg-white rounded-t-3xl sm:rounded-2xl w-full sm:max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto transform translate-y-10 transition-transform duration-200">
      <div class="flex justify-between items-center pb-4 border-b border-slate-100 mb-4">
        <h2 id="todo-modal-title" class="text-lg font-bold text-slate-900">新增待辦事項</h2>
        <button onclick="closeTodoModal()" class="text-slate-400 hover:text-slate-700 text-xl font-bold cursor-pointer p-1">✕</button>
      </div>
      <form id="todo-form" onsubmit="event.preventDefault(); submitTodoForm();">
        <input type="hidden" id="todo-rowIndex">
        <input type="hidden" id="todo-isDone" value="false">
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">分類 *</label>
          <input type="text" id="todo-category" placeholder="如 機票簽證, 行前準備" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">待辦任務 *</label>
          <input type="text" id="todo-task" placeholder="任務名稱..." required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">詳細備註</label>
          <textarea id="todo-note" rows="3" placeholder="輸入相關詳細備註..." class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold"></textarea>
        </div>
        <div class="flex space-x-3 mt-6">
          <button type="button" id="todo-delete-btn" onclick="deleteTodo()" class="btn-delete bg-rose-50 hover:bg-rose-100 active:scale-95 text-rose-600 font-bold text-sm px-4.5 py-2.5 rounded-xl transition-all hidden">🗑️ 刪除</button>
          <button type="button" onclick="closeTodoModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-700 font-bold text-sm py-2.5 rounded-xl transition-all">取消</button>
          <button type="submit" id="todo-save-btn" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-95 text-white font-bold text-sm py-2.5 rounded-xl transition-all">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 3. 打包 Modal -->
  <div id="modal-packing" class="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 hidden opacity-0 transition-opacity duration-200">
    <div class="bg-white rounded-t-3xl sm:rounded-2xl w-full sm:max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto transform translate-y-10 transition-transform duration-200">
      <div class="flex justify-between items-center pb-4 border-b border-slate-100 mb-4">
        <h2 id="packing-modal-title" class="text-lg font-bold text-slate-900">新增打包行李</h2>
        <button onclick="closePackingModal()" class="text-slate-400 hover:text-slate-700 text-xl font-bold cursor-pointer p-1">✕</button>
      </div>
      <form id="packing-form" onsubmit="event.preventDefault(); submitPackingForm();">
        <input type="hidden" id="packing-rowIndex">
        <input type="hidden" id="packing-isPacked" value="false">
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">分類 *</label>
            <input type="text" id="packing-category" placeholder="如 衣物, 3C電器" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
          </div>
          <div>
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">準備人 *</label>
            <input type="text" id="packing-person" placeholder="如 Jo, Will, 公用" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">物品名稱 *</label>
          <input type="text" id="packing-item" placeholder="準備帶的物品..." required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">說明/備註</label>
          <textarea id="packing-note" rows="3" placeholder="輸入相關說明..." class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold"></textarea>
        </div>
        <div class="flex space-x-3 mt-6">
          <button type="button" id="packing-delete-btn" onclick="deletePacking()" class="btn-delete bg-rose-50 hover:bg-rose-100 active:scale-95 text-rose-600 font-bold text-sm px-4.5 py-2.5 rounded-xl transition-all hidden">🗑️ 刪除</button>
          <button type="button" onclick="closePackingModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-700 font-bold text-sm py-2.5 rounded-xl transition-all">取消</button>
          <button type="submit" id="packing-save-btn" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-95 text-white font-bold text-sm py-2.5 rounded-xl transition-all">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 4. 購物 Modal -->
  <div id="modal-shopping" class="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 hidden opacity-0 transition-opacity duration-200">
    <div class="bg-white rounded-t-3xl sm:rounded-2xl w-full sm:max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto transform translate-y-10 transition-transform duration-200">
      <div class="flex justify-between items-center pb-4 border-b border-slate-100 mb-4">
        <h2 id="shopping-modal-title" class="text-lg font-bold text-slate-900">新增購物裝備</h2>
        <button onclick="closeShoppingModal()" class="text-slate-400 hover:text-slate-700 text-xl font-bold cursor-pointer p-1">✕</button>
      </div>
      <form id="shopping-form" onsubmit="event.preventDefault(); submitShoppingForm();">
        <input type="hidden" id="shop-rowIndex">
        <input type="hidden" id="shop-isDone" value="false">
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">購買通路/商店 *</label>
            <input type="text" id="shop-store" placeholder="如 Costco, Target" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
          </div>
          <div>
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">為誰購買 *</label>
            <input type="text" id="shop-forWhom" placeholder="如 Jo, Will, 特特, 公用" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-4">
          <div class="col-span-2">
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">物品名稱 *</label>
            <input type="text" id="shop-item" placeholder="欲購買物品..." required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
          </div>
          <div>
            <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">數量 *</label>
            <input type="text" id="shop-quantity" value="1" required class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold text-center font-bold">
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">圖片連結 (選填)</label>
          <input type="url" id="shop-image" placeholder="商品縮圖 https://..." class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">參考官網連結 (選填)</label>
          <input type="url" id="shop-url" placeholder="產品詳情網址 https://..." class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold">
        </div>
        <div class="mb-4">
          <label class="block text-2xs font-extrabold text-slate-500 uppercase tracking-wider mb-1">備註說明</label>
          <textarea id="shop-note" rows="2" placeholder="規格、型號或相關說明..." class="w-full bg-slate-50 border border-slate-200 text-sm px-3.5 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all font-semibold"></textarea>
        </div>
        <div class="flex space-x-3 mt-6">
          <button type="button" id="shop-delete-btn" onclick="deleteShopping()" class="btn-delete bg-rose-50 hover:bg-rose-100 active:scale-95 text-rose-600 font-bold text-sm px-4.5 py-2.5 rounded-xl transition-all hidden">🗑️ 刪除</button>
          <button type="button" onclick="closeShoppingModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-700 font-bold text-sm py-2.5 rounded-xl transition-all">取消</button>
          <button type="submit" id="shop-save-btn" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-95 text-white font-bold text-sm py-2.5 rounded-xl transition-all">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast 提示容器 -->
  <div id="toastContainer" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col space-y-2 items-center pointer-events-none"></div>

  <script>
    // 📦 4. 動態載入核心腳本
    fetch('scripts.html?v=2.0')
      .then(r => r.text())
      .then(htmlText => {
        // 從 scripts.html 中萃取出 <script> 標籤內的純 JS 內容並執行
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlText;
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          newScript.textContent = oldScript.textContent;
          document.body.appendChild(newScript);
        });
      })
      .catch(err => console.error("動態載入 scripts 失敗:", err));
  </script>
  
  <!-- 手機板底部導覽列 (Bottom Navigation Bar) -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-100 z-40 pb-[safe-area-inset-bottom] shadow-lg flex justify-around items-center h-16 select-none">
    <button id="tab-itinerary" onclick="switchTab('itinerary')" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-900 transition-colors active:scale-95">
      <span class="text-xl transition-transform scale-110 duration-200">🗓️</span>
      <span class="text-[10px] font-black mt-1.5 tracking-wider">行程</span>
    </button>
    <button id="tab-todo" onclick="switchTab('todo')" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 transition-colors active:scale-95">
      <span class="text-lg transition-transform scale-100 duration-200">✅</span>
      <span class="text-[10px] font-medium mt-1.5 tracking-wider">待辦</span>
    </button>
    <button id="tab-packing" onclick="switchTab('packing')" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 transition-colors active:scale-95">
      <span class="text-lg transition-transform scale-100 duration-200">🧳</span>
      <span class="text-[10px] font-medium mt-1.5 tracking-wider">打包</span>
    </button>
    <button id="tab-expenses" onclick="switchTab('expenses')" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 transition-colors active:scale-95">
      <span class="text-lg transition-transform scale-100 duration-200">💵</span>
      <span class="text-[10px] font-medium mt-1.5 tracking-wider">記帳</span>
    </button>
    <button id="tab-shopping" onclick="switchTab('shopping')" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 transition-colors active:scale-95">
      <span class="text-lg transition-transform scale-100 duration-200">🛒</span>
      <span class="text-[10px] font-medium mt-1.5 tracking-wider">購物</span>
    </button>
  </nav>

</body>
</html>
