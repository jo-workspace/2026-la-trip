<script>
    let currentTab = 'itinerary';
    let currentFilterGroup = '全部';
    let fxRate = 32.5;
    let tripNote = "";
    let itineraryData = [], todoData = [], packingData = [], expensesData = [], shoppingData = [];

    let selectedFormCategory = '🍔', selectedFormPaidBy = 'Jo', selectedFormSplit = '公用', selectedFormCurrency = 'USD';

    // 各項分類對應之色彩系統（適用於歷史明細與分類圓圈）
    const categoryColors = {
      '🍔': { bg: 'bg-amber-50', text: 'text-amber-600' },
      '美食': { bg: 'bg-amber-50', text: 'text-amber-600' },
      '🛒': { bg: 'bg-indigo-50', text: 'text-indigo-600' },
      '購物': { bg: 'bg-indigo-50', text: 'text-indigo-600' },
      '🚗': { bg: 'bg-sky-50', text: 'text-sky-600' },
      '交通': { bg: 'bg-sky-50', text: 'text-sky-600' },
      '⚾': { bg: 'bg-emerald-50', text: 'text-emerald-600' },
      '球場': { bg: 'bg-emerald-50', text: 'text-emerald-600' },
      '🏨': { bg: 'bg-rose-50', text: 'text-rose-600' },
      '住宿': { bg: 'bg-rose-50', text: 'text-rose-600' },
      '其他': { bg: 'bg-slate-100', text: 'text-slate-650' }
    };

    const iconMapping = {
      '航班': '✈️', '住宿': '🏨', '景點': '📍', '行程': '🗓️', '球場': '⚾', '交通': '🚗', '購物': '🛒', '美食': '🍔'
    };

    function adjustStickyTops() {
      const header = document.querySelector('header');
      const subCtrl = document.getElementById('subSubControl');
      const anchorBar = document.getElementById('itinerary-anchor-bar');
      if (!header) return;
      const isHidden = header.style.transform === 'translateY(-100%)';
      const targetTop = isHidden ? '0px' : '53px';
      if (subCtrl) subCtrl.style.top = targetTop;
      if (anchorBar) anchorBar.style.top = targetTop;
    }

    function initApp() {
      // 依據網址的 hash 自動切換至對應分頁，否則預設為 itinerary
      const initialTab = location.hash.substring(1) || 'itinerary';
      activateTab(initialTab);

      renderSkeleton();
      fetchInitialData();
      
      const toggle = document.getElementById('hideVisitedToggle');
      const sidebarToggle = document.getElementById('sidebarHideToggle');
      
      function handleToggleChange(e) {
        const checked = e.target.checked;
        if (toggle && toggle.checked !== checked) {
          toggle.checked = checked;
        }
        if (sidebarToggle && sidebarToggle.checked !== checked) {
          sidebarToggle.checked = checked;
        }
        updateToggleBtnStyle();
        renderCurrentTab();
      }

      if (toggle) {
        toggle.removeEventListener('change', handleToggleChange);
        toggle.addEventListener('change', handleToggleChange);
      }
      if (sidebarToggle) {
        sidebarToggle.removeEventListener('change', handleToggleChange);
        sidebarToggle.addEventListener('change', handleToggleChange);
      }

      // 頂部 Header 滾動自動隱藏邏輯
      let lastScrollY = window.scrollY;
      const header = document.querySelector('header');
      if (header) {
        window.addEventListener('scroll', () => {
          const currentScrollY = window.scrollY;
          if (currentScrollY > lastScrollY && currentScrollY > 60) {
            // 往下滾動 - 隱藏 Header
            header.style.transform = 'translateY(-100%)';
          } else {
            // 往上滾動 - 顯示 Header
            header.style.transform = 'translateY(0)';
          }
          adjustStickyTops();
          lastScrollY = currentScrollY;
        }, { passive: true });
      }
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      initApp();
    } else {
      window.onload = initApp;
    }

    // 監聽網址的 Hash 變化，以支援瀏覽器上一頁/下一頁切換分頁
    window.onhashchange = function() {
      const tab = location.hash.substring(1) || 'itinerary';
      activateTab(tab);
    };

    // 骨架屏 (Skeleton Loader) 渲染，提升首載視覺體驗
    function renderSkeleton() {
      const container = document.getElementById('skeletonContainer') || document.getElementById('mainContainer');
      container.innerHTML = `
        <div class="space-y-4 animate-pulse mt-2">
          <div class="h-6 bg-slate-200 rounded-md w-1/3 mb-2"></div>
          <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-2xs flex justify-between items-start">
            <div class="flex-1 space-y-3 pr-4">
              <div class="flex items-center space-x-2">
                <div class="h-8 w-8 bg-slate-200 rounded-full"></div>
                <div class="h-5 bg-slate-200 rounded w-1/4"></div>
                <div class="h-6 bg-slate-200 rounded w-1/2"></div>
              </div>
              <div class="h-4 bg-slate-200 rounded w-5/6 ml-10"></div>
              <div class="h-4 bg-slate-200 rounded w-2/3 ml-10"></div>
            </div>
            <div class="h-5 w-5 bg-slate-200 rounded-md"></div>
          </div>
          <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-2xs flex justify-between items-start">
            <div class="flex-1 space-y-3 pr-4">
              <div class="flex items-center space-x-2">
                <div class="h-8 w-8 bg-slate-200 rounded-full"></div>
                <div class="h-5 bg-slate-200 rounded w-1/3"></div>
                <div class="h-6 bg-slate-200 rounded w-2/5"></div>
              </div>
              <div class="h-4 bg-slate-200 rounded w-3/4 ml-10"></div>
            </div>
            <div class="h-5 w-5 bg-slate-200 rounded-md"></div>
          </div>
        </div>
      `;
    }

    // Toast 浮動提示功能
    function showToast(msg, type = "success") {
      const container = document.getElementById('toastContainer');
      if (!container) return;
      
      const toast = document.createElement('div');
      toast.className = `transform translate-y-10 opacity-0 transition-all duration-300 px-4 py-2.5 rounded-full text-xs font-semibold shadow-md flex items-center space-x-2 pointer-events-auto ${
        type === 'error' ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white'
      }`;
      
      const icon = type === 'error' ? '⚠️' : '✅';
      toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
      container.appendChild(toast);
      
      // Animate in
      setTimeout(() => {
        toast.classList.remove('translate-y-10', 'opacity-0');
      }, 10);
      
      // Animate out
      setTimeout(() => {
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => { toast.remove(); }, 300);
      }, 2500);
    }

    // 判斷是否為 Google Maps 連結
    function isGoogleMapsUrl(url) {
      if (!url) return false;
      const lower = url.toLowerCase();
      return lower.includes('google.com/maps') || lower.includes('maps.app.goo.gl') || lower.includes('maps.google');
    }

    // 從 Google Maps 連結中精準提取導航點（座標、Place Name 或 Search Query）
    function extractPlaceForRouting(url, title) {
      if (!url) return "";
      
      // 1. 嘗試提取 Search API Query 參數
      const queryMatch = url.match(/[?&]query=([^&]+)/);
      if (queryMatch) {
        try {
          return decodeURIComponent(queryMatch[1].replace(/\+/g, ' '));
        } catch(e) {
          return queryMatch[1];
        }
      }

      // 2. 嘗試提取精準經緯度座標（@lat,lng - 最精準，免語意搜尋錯誤）
      const coordMatch = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (coordMatch) {
        return `${coordMatch[1]},${coordMatch[2]}`;
      }
      
      // 3. 嘗試從標準 place URL 中提取目的地英文/名稱
      const placeMatch = url.match(/\/maps\/place\/([^/]+)/);
      if (placeMatch) {
        try {
          return decodeURIComponent(placeMatch[1].replace(/\+/g, ' '));
        } catch(e) {
          return placeMatch[1];
        }
      }
      
      // 4. 無法提取則回退為空字串，不允許語意搜尋標題
      return "";
    }

    // 首次抓取資料 (預設使用 CacheService 機制，極速載入)
    function fetchInitialData() {
      google.script.run
        .withSuccessHandler(function(response) {
          if (!response) { showError("未取得回傳資料"); return; }
          itineraryData = response.itinerary || [];
          todoData = response.todo || [];
          packingData = response.packing || [];
          expensesData = response.expenses || [];
          shoppingData = response.shopping || [];
          fxRate = response.fxRate || 32.5;
          tripNote = response.tripNote || "";
          updateSubControlMenu();
          renderCurrentTab();
        })
        .withFailureHandler(function(err) {
          showError("Apps Script 執行失敗: " + err.message);
        })
        .getAllData(false); // 不強制 Bypass，優先讀取快取
    }

    // 強制手動重整 (跳過快取，重新撈取 Google Sheet 最強防禦)
    function handleRefresh() {
      const btnIcon = document.getElementById('refreshIcon');
      const container = document.getElementById('mainContainer');
      btnIcon.classList.add('spin-animation');
      container.classList.add('opacity-50');
     
      google.script.run
        .withSuccessHandler(function(response) {
          btnIcon.classList.remove('spin-animation');
          container.classList.remove('opacity-50');
          if (!response) return;
          itineraryData = response.itinerary || [];
          todoData = response.todo || [];
          packingData = response.packing || [];
          expensesData = response.expenses || [];
          shoppingData = response.shopping || [];
          fxRate = response.fxRate || 32.5;
          tripNote = response.tripNote || "";
          updateSubControlMenu();
          renderCurrentTab();
          showToast("資料已更新為 Google Sheet 最新內容");
        })
        .withFailureHandler(function(err) {
          btnIcon.classList.remove('spin-animation');
          container.classList.remove('opacity-50');
          showError("重新整理失敗: " + err.message);
        })
        .getAllData(true); // 傳入 true 強製重新從試算表讀取，並重設快取
    }

    function showError(msg) {
      document.getElementById('mainContainer').innerHTML = `
        <div class="bg-rose-50 border border-rose-100 p-4 text-rose-800 text-xs font-mono leading-relaxed rounded-2xl shadow-sm">
          <div class="font-bold text-sm mb-1 flex items-center">❌ 讀取發生錯誤</div>
          <div>${msg}</div>
        </div>
      `;
    }

    function updateSubControlMenu() {
      const subCtrl = document.getElementById('subSubControl');
      subCtrl.innerHTML = '';
      
      if (currentTab === 'todo') {
        subCtrl.className = "bg-slate-50/90 backdrop-blur-xs px-4 py-2 md:pl-72 md:pr-8 md:pt-6 md:pb-4 border-b border-slate-200/40 sticky top-[53px] z-30 flex space-x-1.5 overflow-x-auto no-scrollbar flex-shrink-0 items-center";
        const addBtn = document.createElement('button');
        addBtn.onclick = () => openTodoModal();
        addBtn.className = "px-3 py-1 text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-250 hover:bg-emerald-100 rounded-full cursor-pointer select-none whitespace-nowrap shadow-3xs transition-all active:scale-95 flex items-center space-x-1 flex-shrink-0";
        addBtn.innerHTML = `<span>➕</span><span>新增待辦</span>`;
        subCtrl.appendChild(addBtn);
      } else if (currentTab === 'packing') {
        subCtrl.className = "bg-slate-50/90 backdrop-blur-xs px-4 py-2 md:pl-72 md:pr-8 md:pt-6 md:pb-4 border-b border-slate-200/40 sticky top-[53px] z-30 flex space-x-1.5 overflow-x-auto no-scrollbar flex-shrink-0 items-center";
        
        const addBtn = document.createElement('button');
        addBtn.onclick = () => openPackingModal();
        addBtn.className = "px-3 py-1 text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-250 hover:bg-emerald-100 rounded-full cursor-pointer select-none whitespace-nowrap shadow-3xs transition-all active:scale-95 flex items-center space-x-1 flex-shrink-0 mr-1.5";
        addBtn.innerHTML = `<span>➕</span><span>新增打包</span>`;
        subCtrl.appendChild(addBtn);

        let personSet = new Set();
        packingData.forEach(item => {
          if (item.person) {
            let tokens = item.person.split(/[\n,，]+/);
            tokens.forEach(t => { if(t.trim()) personSet.add(t.trim()); });
          }
        });
        appendFilterElements(['全部', ...Array.from(personSet)], (target) => {
          if (currentTab === 'packing') renderPacking();
        });
      } else if (currentTab === 'shopping') {
        subCtrl.className = "bg-slate-50/90 backdrop-blur-xs px-4 py-2 md:pl-72 md:pr-8 md:pt-6 md:pb-4 border-b border-slate-200/40 sticky top-[53px] z-30 flex space-x-1.5 overflow-x-auto no-scrollbar flex-shrink-0 items-center";
        
        const addBtn = document.createElement('button');
        addBtn.onclick = () => openShoppingModal();
        addBtn.className = "px-3 py-1 text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-250 hover:bg-emerald-100 rounded-full cursor-pointer select-none whitespace-nowrap shadow-3xs transition-all active:scale-95 flex items-center space-x-1 flex-shrink-0 mr-1.5";
        addBtn.innerHTML = `<span>➕</span><span>新增購物</span>`;
        subCtrl.appendChild(addBtn);

        let storeSet = new Set();
        shoppingData.forEach(item => {
          if (item.store) {
            let tokens = item.store.split(/[\n,，]+/);
            tokens.forEach(t => { if(t.trim()) storeSet.add(t.trim()); });
          }
        });
        appendFilterElements(['全部', ...Array.from(storeSet)], (target) => {
          if (currentTab === 'shopping') renderShopping();
        });
      } else {
        subCtrl.className = "hidden";
      }
      adjustStickyTops();
    }

    function switchTab(tab) {
      location.hash = tab;
    }

    function activateTab(tab) {
      const validTabs = ['itinerary', 'todo', 'packing', 'expenses', 'shopping'];
      if (!validTabs.includes(tab)) {
        tab = 'itinerary';
      }
      
      currentTab = tab;
      currentFilterGroup = '全部';
     
      validTabs.forEach(key => {
        // 1. 手機板底部導覽列樣式切換 (Pill 展開動畫)
        const el = document.getElementById(`tab-${key}`);
        if (el) {
          const textSpan = el.querySelector('span:last-child');
          
          if (key === tab) {
            el.className = "flex items-center justify-center py-1.5 px-3.5 bg-white text-[#2c3e4c] font-bold rounded-full transition-all duration-300 active:scale-95 cursor-pointer shadow-xs";
            if (textSpan) {
              textSpan.classList.remove('hidden');
              textSpan.className = "text-xs font-bold tracking-wider ml-1.5";
            }
          } else {
            el.className = "flex items-center justify-center py-2 px-3.5 text-[#ecf0f3] hover:text-white transition-all duration-300 rounded-full active:scale-95 cursor-pointer";
            if (textSpan) {
              textSpan.classList.add('hidden');
            }
          }
        }
        
        // 2. 電腦版左側邊欄樣式切換
        const sidebarEl = document.getElementById(`sidebar-tab-${key}`);
        if (sidebarEl) {
          if (key === tab) {
            sidebarEl.className = "w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#2c3e4c] bg-white font-semibold border-l-4 border-[#3a4b53] pl-3 cursor-pointer";
          } else {
            sidebarEl.className = "w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#ecf0f3] hover:text-white hover:bg-[#495e6d]/40 font-medium border-l-4 border-transparent cursor-pointer";
          }
        }
      });
     
      const tabLabels = {
        itinerary: '隱藏去過',
        todo: '隱藏已做',
        packing: '隱藏打包',
        expenses: '記帳明細',
        shopping: '隱藏買過'
      };
      
      const toggleLabel = document.getElementById('toggleLabel');
      if (toggleLabel) toggleLabel.innerText = tabLabels[tab];
      
      const mainToggleContainer = document.getElementById('mainToggleContainer');
      if (mainToggleContainer) {
        mainToggleContainer.className = (tab === 'expenses')
          ? "hidden"
          : "flex items-center space-x-1 text-xs font-bold text-slate-500 bg-slate-100 hover:bg-slate-200/80 px-2.5 py-1.5 rounded-full cursor-pointer select-none transition-colors duration-150";
      }

      updateSubControlMenu();
      renderCurrentTab();
    }

    function appendFilterElements(list, onFilterChange) {
      const subCtrl = document.getElementById('subSubControl');
      if (!list.includes(currentFilterGroup)) currentFilterGroup = '全部';

      list.forEach(item => {
        const div = document.createElement('div');
        div.innerText = item;
        div.id = `filter-${item}`;
        div.onclick = () => {
          currentFilterGroup = item;
          list.forEach(x => {
            const el = document.getElementById(`filter-${x}`);
            if (el) {
              el.className = (x === currentFilterGroup)
                ? "px-3 py-1 text-xs font-bold bg-slate-800 text-white rounded-full cursor-pointer select-none transition-all duration-200 whitespace-nowrap shadow-2xs"
                : "px-3 py-1 text-xs font-semibold text-slate-500 bg-white border border-slate-200/60 rounded-full cursor-pointer select-none hover:bg-slate-55 transition-all duration-200 whitespace-nowrap";
            }
          });
          onFilterChange(item);
        };
        div.className = (item === currentFilterGroup)
          ? "px-3 py-1 text-xs font-bold bg-slate-800 text-white rounded-full cursor-pointer select-none transition-all duration-200 whitespace-nowrap shadow-2xs"
          : "px-3 py-1 text-xs font-semibold text-slate-500 bg-white border border-slate-200/60 rounded-full cursor-pointer select-none hover:bg-slate-55 transition-all duration-200 whitespace-nowrap";
        subCtrl.appendChild(div);
      });
    }

    function renderCurrentTab() {
      if (currentTab === 'itinerary') renderItinerary();
      else if (currentTab === 'todo') renderTodo();
      else if (currentTab === 'packing') renderPacking();
      else if (currentTab === 'expenses') renderExpenses();
      else if (currentTab === 'shopping') renderShopping();
    }

    // === 1. 行程頁面 ===
    function renderItinerary() {
      const container = document.getElementById('mainContainer');
      const hideVisited = document.getElementById('hideVisitedToggle').checked;
      if (itineraryData.length === 0 && !tripNote) { 
        container.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">目前沒有行程資料</div>'; 
        return; 
      }

      let noteContainer = document.getElementById('itinerary-note-container');
      let anchorBar = document.getElementById('itinerary-anchor-bar');
      let cardsList = document.getElementById('itinerary-cards-list');

      if (!anchorBar || !cardsList) {
        container.innerHTML = '';

        noteContainer = document.createElement('div');
        noteContainer.id = 'itinerary-note-container';
        container.appendChild(noteContainer);

        anchorBar = document.createElement('div');
        anchorBar.id = 'itinerary-anchor-bar';
        anchorBar.className = "flex space-x-2 overflow-x-auto no-scrollbar py-2 mb-4 sticky top-[53px] bg-slate-50/90 backdrop-blur-xs z-30 border-b border-slate-200/40 pl-1";
        container.appendChild(anchorBar);

        cardsList = document.createElement('div');
        cardsList.id = 'itinerary-cards-list';
        container.appendChild(cardsList);
      }

      if (tripNote) {
        noteContainer.className = "bg-slate-800 text-slate-200 p-4.5 mb-5 border-l-4 border-amber-400 rounded-r-2xl shadow-xs transition-all hover:shadow-sm";
        noteContainer.innerHTML = `
          <div class="text-xs font-bold tracking-wider uppercase text-amber-400 mb-2 flex items-center">
            <span>📢</span><span class="ml-1.5">行程重要備註</span>
          </div>
          <div class="text-sm font-medium leading-relaxed font-sans text-slate-100">${tripNote}</div>
        `;
        noteContainer.classList.remove('hidden');
      } else {
        noteContainer.innerHTML = '';
        noteContainer.classList.add('hidden');
      }

      renderItineraryAnchorBar();
      renderItineraryCards();
      adjustStickyTops();
    }

    function renderItineraryAnchorBar() {
      const anchorBar = document.getElementById('itinerary-anchor-bar');
      if (!anchorBar) return;

      const hideVisited = document.getElementById('hideVisitedToggle').checked;

      // --- 計算與生成 Day 錨點按鈕列 (已去過標灰並置後) ---
      let dayMap = {};
      itineraryData.forEach(item => {
        if (!dayMap[item.day]) {
          dayMap[item.day] = { allVisited: true, rawDay: item.day };
        }
        if (!item.isVisited) {
          dayMap[item.day].allVisited = false;
        }
      });

      let activeDays = [];
      let completedDays = [];
      Object.keys(dayMap).forEach(day => {
        const info = dayMap[day];
        if (info.allVisited) completedDays.push(info);
        else activeDays.push(info);
      });

      const sortDaysFn = (a, b) => {
        const numA = parseInt(a.rawDay.replace(/[^0-9]/g, '')) || 999;
        const numB = parseInt(b.rawDay.replace(/[^0-9]/g, '')) || 999;
        return numA - numB;
      };
      activeDays.sort(sortDaysFn);
      completedDays.sort(sortDaysFn);

      let orderedDays = [...activeDays, ...completedDays];

      anchorBar.innerHTML = '';
      
      // Prepend "➕ 新增行程" button to Itinerary Day list
      const addBtn = document.createElement('button');
      addBtn.onclick = () => openItineraryModal();
      addBtn.className = "px-3 py-1.5 text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 hover:bg-emerald-100 rounded-full cursor-pointer select-none whitespace-nowrap shadow-3xs transition-all active:scale-95 flex items-center space-x-1 flex-shrink-0 mr-1.5";
      addBtn.innerHTML = `<span>➕</span><span>新增行程</span>`;
      anchorBar.appendChild(addBtn);

      if (orderedDays.length > 0) {
        orderedDays.forEach(dayInfo => {
          const btn = document.createElement('button');
          const safeDayId = dayInfo.rawDay.replace(/[^a-zA-Z0-9]/g, '');
          btn.onclick = () => {
            const targetEl = document.getElementById(`day-header-${safeDayId}`);
            if (targetEl) {
              targetEl.scrollIntoView({ behavior: 'smooth' });
            } else {
              if (dayInfo.allVisited && hideVisited) {
                showToast(`此日行程已全部完成，請取消勾選「隱藏去過」以查看詳細行程`);
              }
            }
          };
          
          if (dayInfo.allVisited) {
            btn.className = "px-3 py-1.5 text-xs font-semibold text-slate-400 bg-slate-100 border border-slate-200/50 rounded-full cursor-pointer select-none whitespace-nowrap opacity-60 hover:opacity-100 transition-all";
            btn.innerText = `✓ ${dayInfo.rawDay}`;
          } else {
            btn.className = "px-3 py-1.5 text-xs font-bold text-slate-700 bg-white border border-slate-200 hover:bg-slate-55 rounded-full cursor-pointer select-none whitespace-nowrap shadow-3xs transition-all active:scale-95";
            btn.innerText = dayInfo.rawDay;
          }
          anchorBar.appendChild(btn);
        });
      }
    }

    function renderItineraryCards() {
      const cardsList = document.getElementById('itinerary-cards-list');
      if (!cardsList) return;

      const hideVisited = document.getElementById('hideVisitedToggle').checked;
      cardsList.innerHTML = '';

      let currentDay = "";

      itineraryData.forEach(item => {

    // === 2. 待辦頁面 ===
    function renderTodo() {
      const container = document.getElementById('mainContainer');
      const hideDone = document.getElementById('hideVisitedToggle').checked;
      if (todoData.length === 0) { container.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">目前沒有待辦事項</div>'; return; }
      container.innerHTML = '';
      
      // Sort by category first, then by rowIndex to group categories together
      const sortedTodo = [...todoData].sort((a, b) => {
        const catA = a.category || "其他";
        const catB = b.category || "其他";
        if (catA !== catB) {
          return catA.localeCompare(catB, 'zh-Hant');
        }
        return a.rowIndex - b.rowIndex;
      });
      
      let currentCategory = "";
      sortedTodo.forEach(item => {
        if (hideDone && item.isDone) return;
        if (item.category !== currentCategory) {
          currentCategory = item.category;
          const catHeader = document.createElement('div');
          catHeader.className = "mt-6 mb-3 text-xs font-bold text-slate-400 uppercase tracking-wider pl-1";
          catHeader.innerText = currentCategory;
          container.appendChild(catHeader);
        }
        const card = document.createElement('div');
        card.className = `bg-white border ${item.isDone ? 'border-slate-100 opacity-40' : 'border-slate-100 shadow-2xs hover:shadow-xs'} rounded-2xl p-4.5 mb-2 flex justify-between items-center transition-all duration-300 transform origin-top`;
        card.id = `todo-${item.rowIndex}`;
        card.innerHTML = `
          <div class="flex-1 pr-4">
            <h3 class="text-base font-extrabold text-slate-955 leading-tight ${item.isDone ? 'line-through text-slate-400' : ''}">${item.task}</h3>
            ${item.note ? `<p class="text-sm text-slate-500 font-medium mt-2.5 leading-relaxed">${item.note}</p>` : ''}
          </div>
          <div class="flex items-center justify-center pl-2 flex-shrink-0 space-x-1.5 h-full">
            <button onclick="openTodoModal(${item.rowIndex})" class="p-1 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-all focus:outline-none flex items-center justify-center cursor-pointer active:scale-90" title="編輯">
              <span class="text-xs leading-none select-none">✎</span>
            </button>
            <input type="checkbox" ${item.isDone ? 'checked' : ''} onclick="toggleTodoArchive(${item.rowIndex}, this)" class="w-5.5 h-5.5 rounded-md border-slate-300 text-slate-900 focus:ring-slate-900 cursor-pointer transition-transform duration-100 active:scale-90">
          </div>
        `;
        container.appendChild(card);
      });
    }

    // === 3. 打包頁面 ===
    function renderPacking() {
      const container = document.getElementById('mainContainer');
      const hidePacked = document.getElementById('hideVisitedToggle').checked;
      if (packingData.length === 0) { container.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">目前沒有打包清單</div>'; return; }
      container.innerHTML = '';
      
      const packingEmojis = {
        '衣物': '👕',
        '3C': '💻',
        '電器': '💻',
        '盥洗': '🧴',
        '保養': '🧴',
        '隨身': '👜',
        '藥': '💊',
        '證件': '🪪',
        '文件': '🪪'
      };

      // 1. 過濾與分組資料
      let grouped = {};
      packingData.forEach(item => {
        if (hidePacked && item.isPacked) return;
        
        let pTokens = item.person ? item.person.split(/[\n,，]+/).map(t => t.trim()) : [];
        if (currentFilterGroup !== '全部' && !pTokens.includes(currentFilterGroup)) return;
        
        const cat = item.category || "其他";
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(item);
      });
      
      const categories = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'zh-Hant'));
      
      if (categories.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">此分類下所有行李皆已打包！🧳✨</div>';
        return;
      }
      
      categories.forEach(cat => {
        // 排序各類別下的項目 (按 rowIndex)
        grouped[cat].sort((a, b) => a.rowIndex - b.rowIndex);
        
        const allItemsPacked = grouped[cat].every(item => item.isPacked);
        
        const card = document.createElement('div');
        card.className = allItemsPacked 
          ? "bg-slate-55 border border-slate-100 rounded-2xl p-4.5 mb-4 shadow-none opacity-80 transition-all duration-300"
          : "bg-white border border-slate-100/80 rounded-2xl p-4.5 mb-4 shadow-3xs hover:shadow-2xs transition-all duration-300";
        
        let emoji = '📦';
        const lowerCat = cat.toLowerCase();
        for (const [key, val] of Object.entries(packingEmojis)) {
          if (lowerCat.includes(key.toLowerCase())) {
            emoji = val;
            break;
          }
        }

        let headerHtml = `
          <div class="border-b border-slate-100 pb-1.5 mb-3.5 flex justify-between items-center select-none">
            <span class="text-xs font-black uppercase tracking-wider text-slate-400 bg-slate-100 px-2 py-1 rounded inline-block mb-3.5 select-none">
              ${allItemsPacked ? '<span class="text-emerald-500 mr-1.5 font-bold">✓</span>' : ''}
              ${emoji} ${cat}
            </span>
            ${allItemsPacked ? '<span class="text-[10px] font-extrabold text-[#3a5240] bg-emerald-50/50 px-2 py-0.5 rounded-md mb-3.5">ALL PACKED</span>' : ''}
          </div>
        `;
        
        let itemsHtml = '<div class="divide-y divide-slate-100/60">';
        grouped[cat].forEach(item => {
          let badgesHtml = "";
          if (currentFilterGroup === '全部' && item.person) {
            let pTokens = item.person.split(/[\n,，]+/).map(t => t.trim());
            pTokens.forEach(p => {
              if (!p) return;
              let colorClass = "bg-emerald-55/60 text-emerald-750 border border-emerald-100/50";
              if (p === 'Jo') colorClass = "bg-indigo-50/70 text-indigo-650 border border-indigo-100/50";
              else if (p === 'Will') colorClass = "bg-slate-100 text-slate-650 border border-slate-200/50";
              badgesHtml += `<span class="inline-block ${colorClass} tracking-wider px-1.5 py-0.5 rounded text-[9px] font-bold ml-1.5">${p}</span>`;
            });
          }
          
          itemsHtml += `
            <div id="packing-row-${item.rowIndex}" class="flex items-center justify-between py-2.5 transition-all duration-200 ${item.isPacked ? 'opacity-40' : ''}">
              <div class="flex items-center space-x-2.5 min-w-0 flex-1 pr-2">
                <input type="checkbox" ${item.isPacked ? 'checked' : ''} onclick="togglePackingArchive(${item.rowIndex}, this)" class="w-5 h-5 rounded border-slate-300 text-slate-900 focus:ring-slate-900 cursor-pointer flex-shrink-0 transition-transform duration-100 active:scale-90">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center flex-wrap gap-y-0.5">
                    <span class="packing-title text-sm font-semibold text-slate-800 leading-tight ${item.isPacked ? 'line-through text-slate-400' : ''}">${item.item}</span>
                    ${badgesHtml}
                  </div>
                  ${item.note ? `<p class="text-xs text-slate-400 mt-0.5 leading-relaxed">${item.note}</p>` : ''}
                </div>
              </div>
              <button onclick="openPackingModal(${item.rowIndex})" class="p-1 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-all flex items-center justify-center cursor-pointer active:scale-90 flex-shrink-0" title="編輯">
                <span class="text-2xs leading-none select-none">✎</span>
              </button>
            </div>
          `;
        });
        itemsHtml += '</div>';
        
        card.innerHTML = headerHtml + itemsHtml;
        container.appendChild(card);
      });
    }

    // === 4. 記帳頁面 ===
    function renderExpenses() {
      const container = document.getElementById('mainContainer'); 
      container.innerHTML = '';
      let totalTWD = 0, joPaidTWD = 0, willPaidTWD = 0, joShareTWD = 0, willShareTWD = 0;

      expensesData.forEach(exp => {
        let amt = parseFloat(exp.amount);
        if (isNaN(amt)) amt = 0;
        let amtTWD = exp.currency === 'USD' ? amt * fxRate : amt; 
        totalTWD += amtTWD;
        if (exp.paidBy === 'Jo') joPaidTWD += amtTWD; 
        if (exp.paidBy === 'Will') willPaidTWD += amtTWD;
        
        if (exp.split === 'Jo') {
          joShareTWD += amtTWD; 
        } else if (exp.split === 'Will') {
          willShareTWD += amtTWD; 
        } else { 
          joShareTWD += amtTWD / 2; 
          willShareTWD += amtTWD / 2; 
        }

      if (joOverage > 0) settlementText = `Will 應給 Jo $${Math.round(joOverage).toLocaleString()}`;

              <button onclick="toggleFormCurrencyShort()" id="curr-toggle" type="button" class="absolute right-1 text-[10px] font-black bg-[#4d5e4d] text-white px-2 py-1 rounded-lg cursor-pointer select-none active:scale-95 transition-all">USD</button>

        calcDiv.classList.add('hidden');

        calcDiv.classList.remove('hidden');

    // 記帳樂觀 UI 送出處理
    function submitExpenseForm() {
      const itemEl = document.getElementById('exp-item');
      const amtEl = document.getElementById('exp-amount');
      const noteEl = document.getElementById('exp-note');
      const btn = document.getElementById('submitExpBtn');
     
      if (!itemEl || !amtEl || !itemEl.value.trim() || !amtEl.value) {
        showToast('請填寫品項名稱與金額', 'error');
        return;
      }
     
      const originalExpenses = [...expensesData];
      const item = itemEl.value.trim();
      const amount = parseFloat(amtEl.value);
      const note = noteEl ? noteEl.value.trim() : "";
     
      btn.innerText = "記帳送出中...";
      btn.style.pointerEvents = "none";
      btn.classList.add('opacity-50');
     
      // 1. 樂觀建立假資料插到最前面
      const tempExpense = {
        rowIndex: -1, // 假索引標記
        category: selectedFormCategory,
        item: item,
        currency: selectedFormCurrency,
        amount: amount,
        paidBy: selectedFormPaidBy,
        split: selectedFormSplit,
        note: note
      };
      expensesData.unshift(tempExpense);
      
      // 2. 清空輸入欄位
      itemEl.value = "";
      amtEl.value = "";
      if(noteEl) noteEl.value = "";
      
      // 3. 立即重繪 UI (零延遲看到結果)
      renderExpenses();
      showToast('已新增記帳 (寫入試算表中...)');

      const formData = {
        category: selectedFormCategory,
        item: item,
        currency: selectedFormCurrency,
        amount: amount,
        paidBy: selectedFormPaidBy,
        split: selectedFormSplit,
        note: note
      };
     
      google.script.run
        .withSuccessHandler(function(res) {
          btn.innerText = "送出記帳";
          btn.style.pointerEvents = "auto";
          btn.classList.remove('opacity-50');
          
          if(res === "Success") {
            // 背景靜默刷新真實資料 (修正假資料的 rowIndex)
            google.script.run
              .withSuccessHandler(function(response) {
                if (response && response.expenses) {
                  expensesData = response.expenses;
                  if (currentTab === 'expenses') renderExpenses();
                }
              })
              .getAllData();
          } else {
            // 寫入失敗回滾
            expensesData = originalExpenses;
            renderExpenses();
            itemEl.value = item;
            amtEl.value = amount;
            if(noteEl) noteEl.value = note;
            showToast("記帳失敗，已還原狀態", "error");
          }
        })
        .withFailureHandler(function(err) {
          btn.innerText = "送出記帳";
          btn.style.pointerEvents = "auto";
          btn.classList.remove('opacity-50');
          
          // 網路錯誤回滾
          expensesData = originalExpenses;
          renderExpenses();
          itemEl.value = item;
          amtEl.value = amount;
          if(noteEl) noteEl.value = note;
          showToast("網路異常: " + err.message, "error");
        })
        .addExpenseData(formData);
    }

      shoppingData.forEach(item => {
        if (hideDone && item.isDone) return;
       
        let sTokens = item.store ? item.store.split(/[\n,，]+/).map(t => t.trim()) : [];
        if (currentFilterGroup !== '全部' && !sTokens.includes(currentFilterGroup)) return;

        let fTokens = item.forWhom ? item.forWhom.split(/[\n,，]+/).map(t => t.trim()) : [];

        let storesHtml = "";
        sTokens.forEach(s => {
          if (s) storesHtml += `<span class="text-[10px] font-bold text-slate-500 bg-slate-100 border border-slate-200/50 px-2 py-0.5 rounded-full whitespace-nowrap">${s}</span>`;

        let forWhomHtml = "";

        });

        let qtyText = item.quantity && item.quantity !== '1' ? `<span class="text-xs font-extrabold text-slate-800 bg-slate-100 border border-slate-200/50 px-1.5 py-0.5 rounded">×${item.quantity}</span>` : '';

              <div class="w-14 h-14 rounded-xl bg-slate-100/80 flex items-center justify-center text-xl text-slate-400">
                🛍️
              </div>

    // === Modal Animations ===
    function animateModalOpen(modalId) {
      const modal = document.getElementById(modalId);
      if (!modal) return;
      modal.classList.remove('hidden');
      requestAnimationFrame(() => {
        modal.classList.remove('opacity-0');
        const dialog = modal.querySelector('div');
        if (dialog) dialog.classList.remove('translate-y-10');
      });
    }

    function animateModalClose(modalId) {
      const modal = document.getElementById(modalId);
      if (!modal) return;
      modal.classList.add('opacity-0');
      const dialog = modal.querySelector('div');
      if (dialog) dialog.classList.add('translate-y-10');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 200);
    }

    function openItineraryModal(rowIndex = null) {
      const form = document.getElementById('itinerary-form');
      if (!form) return;
      form.reset();
      
      const titleEl = document.getElementById('itinerary-modal-title');
      const deleteBtn = document.getElementById('iti-delete-btn');
      
      if (!rowIndex) {
        document.getElementById('iti-rowIndex').value = "";
        document.getElementById('iti-isVisited').value = "false";
        
        let defaultDay = "Day 1";
        if (itineraryData.length > 0) {
          defaultDay = itineraryData[itineraryData.length - 1].day;
        }
        document.getElementById('iti-day').value = defaultDay;
        document.getElementById('iti-time').value = "";
        document.getElementById('iti-type').value = "景點";
        document.getElementById('iti-title').value = "";
        document.getElementById('iti-content').value = "";
        document.getElementById('iti-links').value = "";
        
        if (titleEl) titleEl.innerText = "新增行程項目";
        if (deleteBtn) deleteBtn.classList.add('hidden');
      } else {
        const item = itineraryData.find(x => x.rowIndex === rowIndex);
        if (!item) return;
        
        document.getElementById('iti-rowIndex').value = item.rowIndex;
        document.getElementById('iti-isVisited').value = item.isVisited;
        document.getElementById('iti-day').value = item.day || "";
        document.getElementById('iti-time').value = item.time || "";
        document.getElementById('iti-type').value = item.type || "景點";
        document.getElementById('iti-title').value = item.title || "";
        document.getElementById('iti-content').value = (item.content || "").replace(/<br>/g, '\n');
        document.getElementById('iti-links').value = item.links || "";
        
        if (titleEl) titleEl.innerText = "編輯行程項目";
        if (deleteBtn) deleteBtn.classList.remove('hidden');

      const isVisited = document.getElementById('iti-isVisited').value === "true" || document.getElementById('iti-isVisited').value === true;
      const day = document.getElementById('iti-day').value.trim();
      const time = document.getElementById('iti-time').value.trim();
      const type = document.getElementById('iti-type').value;
      const title = document.getElementById('iti-title').value.trim();
      const content = document.getElementById('iti-content').value.trim();
      const links = document.getElementById('iti-links').value.trim();
      
      if (!day || !title) {
        showToast("請填寫天數與名稱/標題", "error");
        return;
      }
      
      const saveBtn = document.getElementById('iti-save-btn');
